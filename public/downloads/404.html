<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>TheApp</title>
    <script>
      // SPA redirect for GitHub Pages
      // Converts path to hash so HashRouter picks it up
      var path = window.location.pathname;
      var base = '/TheAppPitch';
      var route = path.replace(base, '') || '/';
      if (route !== '/' && route !== '') {
        window.location.replace(base + '/#' + route);
      } else {
        window.location.replace(base + '/');
      }
    </script>
  </head>
  <body></body>
</html>
